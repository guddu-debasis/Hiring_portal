name: NeuralNexus Keep-Alive Heartbeat

on:
  schedule:
    # This runs every 14 minutes (Render sleeps at 15)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping_server:
    runs-on: ubuntu-latest
    steps:
      - name: Send Wake-up Request
        run: |
          curl -I https://hiring-portal-xl3g.onrender.com/api/v1/jobs/